<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Translation Tool</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background:#f4f4f4;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
    }

    .container{
        background:white;
        width:600px;
        padding:25px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    h2{
        text-align:center;
        margin-bottom:20px;
    }

    textarea{
        width:100%;
        height:120px;
        padding:10px;
        border:1px solid #ccc;
        border-radius:5px;
        resize:none;
        margin-bottom:15px;
    }

    .languages{
        display:flex;
        justify-content:space-between;
        gap:10px;
        margin-bottom:15px;
    }

    select{
        width:100%;
        padding:10px;
        border-radius:5px;
        border:1px solid #ccc;
    }

    button{
        width:100%;
        padding:12px;
        border:none;
        background:#007bff;
        color:white;
        font-size:16px;
        border-radius:5px;
        cursor:pointer;
        margin-top:10px;
    }

    button:hover{
        background:#0056b3;
    }

    #translatedText{
        margin-top:20px;
        padding:15px;
        background:#f8f8f8;
        border-radius:5px;
        min-height:80px;
        border:1px solid #ddd;
    }

    .copy-btn{
        background:green;
    }

    .copy-btn:hover{
        background:darkgreen;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Language Translation Tool</h2>

    <textarea id="inputText" placeholder="Enter text here..."></textarea>

    <div class="languages">
        <select id="sourceLang">
            <option value="en">English</option>
            <option value="ur">Urdu</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
        </select>

        <select id="targetLang">
            <option value="ur">Urdu</option>
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
        </select>
    </div>

    <button onclick="translateText()">Translate</button>

    <div id="translatedText">
        Translated text will appear here...
    </div>

    <button class="copy-btn" onclick="copyText()">Copy Translation</button>
</div>

<script>
async function translateText() {

    const text = document.getElementById("inputText").value;
    const source = document.getElementById("sourceLang").value;
    const target = document.getElementById("targetLang").value;

    if(text.trim() === ""){
        alert("Please enter text.");
        return;
    }

    const output = document.getElementById("translatedText");
    output.innerHTML = "Translating...";

    try {

        const url =
        `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${source}|${target}`;

        const response = await fetch(url);
        const data = await response.json();

        output.innerHTML =
        data.responseData.translatedText;

    } catch(error) {
        output.innerHTML = "Translation failed!";
        console.error(error);
    }
}

function copyText() {

    const text =
    document.getElementById("translatedText").innerText;

    navigator.clipboard.writeText(text)
    .then(() => {
        alert("Translation copied!");
    });
}
</script>

</body>
</html>
